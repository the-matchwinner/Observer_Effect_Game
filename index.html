<!DOCTYPE html>
<html>
<head>
  <title>Observer Effect: Trust.exe</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    canvas {
      display: block;
      margin: auto;
      background: #111;
      border: 2px solid white;
    }
  </style>
</head>
<body>

<h2>👁️ Observer Effect: Trust.exe</h2>
<p id="msg">Press SPACE to Start</p>
<p id="scoreText">Score: 0</p>

<canvas id="gameCanvas" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const msg = document.getElementById("msg");
const scoreText = document.getElementById("scoreText");

let gameStarted = false;
let isGameOver = false;

let player = { x: 100, y: 180, size: 20 };
let keys = {};

let walls = [];
let speed = 2.5;
let score = 0;

let safeColor, safeCount, maxSafe;

// 🔊 SOUND SYSTEM
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, duration = 0.15) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = freq;
  osc.type = "sine";

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

  setTimeout(() => osc.stop(), duration * 1000);
}

// 🎮 INPUT
document.addEventListener("keydown", e => {
  keys[e.key] = true;

  if (e.code === "Space") {
    if (!gameStarted) startGame();
  }

  if (e.key.toLowerCase() === "r") {
    restartGame();
  }
});

document.addEventListener("keyup", e => keys[e.key] = false);

// START GAME
function startGame() {
  gameStarted = true;
  isGameOver = false;

  safeColor = Math.random() > 0.5 ? "green" : "red";
  safeCount = 0;
  maxSafe = safeColor === "green" ? 3 : 1;

  msg.innerText = safeColor.toUpperCase() + " IS SAFE";
  playSound(500);
}

// RESTART GAME
function restartGame() {
  walls = [];
  score = 0;
  player.y = 180;
  speed = 2.5;

  gameStarted = false;
  isGameOver = false;

  msg.innerText = "Press SPACE to Start";
}

// GENERATE WALL
function generateWall() {
  walls.push({
    x: 600,
    split: Math.random() * 200 + 100,
    order: Math.random() > 0.5,
    passed: false
  });
}

function update() {
  if (!gameStarted || isGameOver) return;

  score += 0.02;
  scoreText.innerText = "Score: " + Math.floor(score);

  if (keys["ArrowUp"]) player.y -= 3;
  if (keys["ArrowDown"]) player.y += 3;

  player.y = Math.max(0, Math.min(380, player.y));

  if (Math.random() < 0.02) generateWall();

  walls.forEach(w => {
    w.x -= speed;

    let topColor = w.order ? "green" : "red";
    let bottomColor = w.order ? "red" : "green";

    if (!w.passed && player.x > w.x) {
      w.passed = true;

      let chosenColor = player.y < w.split ? topColor : bottomColor;

      if (chosenColor === safeColor) {
        safeCount++;
        playSound(700); // correct

        if (safeCount > maxSafe) {
          gameOver("You believed " + safeColor.toUpperCase());
        }
      } else {
        playSound(300); // neutral pass
      }
    }
  });

  walls = walls.filter(w => w.x > -50);

  speed = 2.5 + score / 150;
}

function gameOver(text) {
  isGameOver = true;
  playSound(120, 0.4); // failure

  msg.innerText =
    "Nothing is what it seems.\n" +
    text +
    "\nPress R to Restart";
}

function draw() {
  ctx.clearRect(0, 0, 600, 400);

  ctx.fillStyle = "white";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  walls.forEach(w => {
    let topColor = w.order ? "green" : "red";
    let bottomColor = w.order ? "red" : "green";

    ctx.fillStyle = topColor;
    ctx.fillRect(w.x, 0, 40, w.split);

    ctx.fillStyle = bottomColor;
    ctx.fillRect(w.x, w.split, 40, 400);
  });
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
